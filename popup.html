<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 220px; padding: 15px; font-family: -apple-system, sans-serif; background: #1a1a1a; color: white; }
    .container { display: flex; align-items: center; justify-content: space-between; }
    .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 20px; }
    input:checked + .slider { background-color: #00ff88; }
    .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider:before { transform: translateX(20px); }
  </style>
</head>
<body>
  <div class="container">
    <span>Better Rendering</span>
    <label class="switch">
      <input type="checkbox" id="renderToggle">
      <span class="slider"></span>
    </label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
